<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Numbers to Words Converter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .output-section {
      margin-top: 30px;
    }

    .result {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      margin-bottom: 15px;
      display: none;
    }

    .result.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-label {
      color: #999;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .result-text {
      color: #333;
      font-size: 18px;
      font-weight: 600;
      word-break: break-word;
    }

    .error {
      background: #fee;
      border-left-color: #e74c3c;
      color: #c0392b;
    }

    .error .result-text {
      color: #c0392b;
    }

    .info-box {
      background: #e8f4f8;
      border-left: 4px solid #3498db;
      padding: 15px;
      border-radius: 8px;
      color: #2c3e50;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔢 Numbers to Words</h1>
    <p class="subtitle">Convert any number to its word representation</p>

    <div class="input-group">
      <input 
        id="num" 
        type="number" 
        placeholder="Enter a number (e.g., 123)"
        min="-999999999"
        max="999999999"
      >
      <button onclick="convert()">Convert</button>
    </div>

    <div class="output-section">
      <div id="result" class="result">
        <div class="result-label">Result</div>
        <div id="out" class="result-text"></div>
      </div>
    </div>

    <div class="info-box">
      <strong>ℹ️ Features:</strong><br>
      • Supports numbers from -999,999,999 to 999,999,999<br>
      • Handles negative numbers<br>
      • Real-time conversion on button click<br>
      • Input validation and error handling
    </div>
  </div>

  <script>
    const ones = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
    const teens = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
    const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];
    const scales = ['', 'thousand', 'million', 'billion'];

    function convertHundreds(num) {
      let result = '';
      
      const hundred = Math.floor(num / 100);
      if (hundred > 0) {
        result += ones[hundred] + ' hundred';
      }

      const remainder = num % 100;
      if (remainder > 0) {
        if (result) result += ' ';
        
        if (remainder < 10) {
          result += ones[remainder];
        } else if (remainder < 20) {
          result += teens[remainder - 10];
        } else {
          const ten = Math.floor(remainder / 10);
          const one = remainder % 10;
          result += tens[ten];
          if (one > 0) {
            result += ' ' + ones[one];
          }
        }
      }

      return result;
    }

    function numberToWords(num) {
      if (num === 0) return 'zero';

      let isNegative = false;
      if (num < 0) {
        isNegative = true;
        num = Math.abs(num);
      }

      let result = '';
      let scaleIndex = 0;

      while (num > 0) {
        if (num % 1000 !== 0) {
          const hundreds = convertHundreds(num % 1000);
          if (scaleIndex > 0) {
            result = hundreds + ' ' + scales[scaleIndex] + ' ' + result;
          } else {
            result = hundreds + ' ' + result;
          }
        }
        num = Math.floor(num / 1000);
        scaleIndex++;
      }

      result = result.trim();
      if (isNegative) {
        result = 'negative ' + result;
      }

      return result.charAt(0).toUpperCase() + result.slice(1);
    }

    function convert() {
      const input = document.getElementById('num');
      const outputDiv = document.getElementById('out');
      const resultDiv = document.getElementById('result');
      const value = input.value.trim();

      resultDiv.classList.remove('error');
      resultDiv.classList.add('show');

      if (!value) {
        outputDiv.textContent = 'Please enter a number';
        resultDiv.classList.add('error');
        return;
      }

      const num = parseInt(value, 10);

      if (isNaN(num)) {
        outputDiv.textContent = 'Invalid input. Please enter a valid number';
        resultDiv.classList.add('error');
        return;
      }

      if (num > 999999999 || num < -999999999) {
        outputDiv.textContent = 'Number out of range. Please enter a number between -999,999,999 and 999,999,999';
        resultDiv.classList.add('error');
        return;
      }

      const words = numberToWords(num);
      outputDiv.textContent = words;
    }

    // Allow conversion on Enter key
    document.getElementById('num').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        convert();
      }
    });
  </script>
</body>
</html>
